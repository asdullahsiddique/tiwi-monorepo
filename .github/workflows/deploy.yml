name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: Pulumi up
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.29.3

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: eu-central-1

      # Set Pulumi stack config from GitHub secrets so Pulumi.prod.yaml
      # doesn't need to exist in the repo. Run this before pulumi up.
      # GitHub secrets to add (Settings → Secrets and variables → Actions):
      #   PULUMI_ACCESS_TOKEN        — https://app.pulumi.com/account/tokens
      #   AWS_ROLE_ARN               — IAM role ARN for OIDC
      #   OPENAI_API_KEY             — sk-...
      #   NEO4J_URI                  — neo4j+s://...
      #   NEO4J_PASSWORD             — ...
      #   ASSEMBLYAI_API_KEY         — ... (optional, set to a dummy value if unused)
      - name: Set Pulumi stack config
        working-directory: infra
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}
        run: |
          pulumi stack select tiwi/prod --create
          pulumi config set aws:region eu-central-1
          pulumi config set --secret tiwi:openAiApiKey     "${{ secrets.OPENAI_API_KEY }}"
          pulumi config set --secret tiwi:neo4jUri         "${{ secrets.NEO4J_URI }}"
          pulumi config set --secret tiwi:neo4jPassword    "${{ secrets.NEO4J_PASSWORD }}"
          pulumi config set --secret tiwi:assemblyAiApiKey "${{ secrets.ASSEMBLYAI_API_KEY }}"

      - name: Pulumi up
        uses: pulumi/actions@v6
        with:
          command: up
          stack-name: tiwi/prod
          work-dir: infra
          upsert: true
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}
          AWS_DEFAULT_REGION: eu-central-1
